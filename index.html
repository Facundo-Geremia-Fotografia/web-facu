<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Facu Photography</title>

  <link rel="stylesheet" href="style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="grain"></div>

<header>
  <div class="logo">FACU.</div>

  <nav>
    <a href="#inicio">Inicio</a>
    <a href="#sobre">Sobre mí</a>
    <a href="#portfolio">Portfolio</a>
    <a href="#servicios">Servicios</a>
    <a href="#contacto">Contacto</a>
  </nav>
</header>

<!-- HERO -->
<section id="inicio" class="hero parallax" data-section="hero">
  <div class="overlay"></div>
  <div class="hero-content" data-content></div>
</section>

<!-- SOBRE MI -->
<section id="sobre" class="about fade-in" data-section="about">
  <div class="about-text" data-content></div>
</section>

<!-- PORTFOLIO -->
<section id="portfolio" class="portfolio" data-section="portfolio">

  <div class="section-title fade-in">
    <p class="section-tag">Portfolio</p>
    <h2>Galería Fotográfica</h2>
  </div>

  <!-- CATEGORIAS -->
  <div class="categories fade-in" data-categories></div>

  <!-- GALERIA -->
  <div class="gallery" data-content></div>

</section>

<!-- SERVICIOS -->
<section id="servicios" class="services" data-section="services">
  <div class="service-grid" data-content></div>
</section>

<!-- CONTACTO -->
<section id="contacto" class="contact fade-in" data-section="contact">
  <div class="section-title">
    <p class="section-tag">Contacto</p>
    <h2>Trabajemos juntos.</h2>
  </div>
  <div class="contact-links" data-content></div>

</section>

<footer>
  <p>© 2026 FACU Photography</p>
</footer>

<!-- EDITOR UI -->
<button id="editor-toggle" title="Editor">⚙</button>
<div id="editor-panel" class="hidden">
  <div class="editor-header">
    <strong>Editor de Secciones</strong>
    <button id="editor-close">Cerrar</button>
  </div>

  <div class="editor-tabs">
    <button data-tab="hero" class="active">Hero</button>
    <button data-tab="about">Sobre</button>
    <button data-tab="portfolio">Portfolio</button>
    <button data-tab="services">Servicios</button>
    <button data-tab="contact">Contacto</button>
  </div>

  <div class="editor-body">
    <div data-editor="hero" class="editor-section">
      <label>Título (HTML allowed):</label>
      <textarea id="hero-title" rows="3"></textarea>
      <label>Subtítulo:</label>
      <input id="hero-subtitle" type="text">
      <label>Fondo (URL):</label>
      <input id="hero-background" type="text">
      <label>CTA label:</label>
      <input id="hero-cta-label" type="text">
      <label>CTA href:</label>
      <input id="hero-cta-href" type="text">
    </div>

    <div data-editor="about" class="editor-section hidden">
      <label>HTML Sobre mí:</label>
      <textarea id="about-html" rows="8"></textarea>
    </div>

    <div data-editor="portfolio" class="editor-section hidden">
      <label>Categorías (JSON array of {"slug","label"}):</label>
      <textarea id="portfolio-cats" rows="4"></textarea>
      <label>Items (JSON array of {"src","alt","category"}):</label>
      <textarea id="portfolio-items" rows="8"></textarea>
      <small>Para añadir imagen local: sube el archivo manualmente a `images/` y pega la ruta aquí.</small>
    </div>

    <div data-editor="services" class="editor-section hidden">
      <label>HTML Servicios:</label>
      <textarea id="services-html" rows="6"></textarea>
    </div>

    <div data-editor="contact" class="editor-section hidden">
      <label>HTML Contacto:</label>
      <textarea id="contact-html" rows="4"></textarea>
    </div>
  </div>

  <div class="editor-actions">
    <button id="editor-load">Cargar</button>
    <button id="editor-save">Exportar JSON</button>
    <button id="editor-copy">Copiar JSON</button>
    <button id="editor-refresh">Refrescar vista</button>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
